<svg viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg" width="400" height="120">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D4AA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00A67E;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Bird silhouette -->
  <!-- Body -->
  <ellipse cx="52" cy="62" rx="22" ry="16" fill="url(#grad)"/>
  <!-- Head -->
  <circle cx="74" cy="50" r="13" fill="url(#grad)"/>
  <!-- Beak -->
  <polygon points="87,48 98,52 87,56" fill="#00A67E"/>
  <!-- Eye -->
  <circle cx="78" cy="48" r="2.5" fill="#001A14"/>
  <circle cx="79" cy="47" r="0.8" fill="white"/>
  <!-- Tail -->
  <polygon points="30,60 10,52 12,64 10,72 30,66" fill="#00A67E"/>
  <!-- Wing detail -->
  <ellipse cx="52" cy="64" rx="14" ry="8" fill="#00A67E" opacity="0.5"/>
  <!-- Legs -->
  <line x1="52" y1="78" x2="48" y2="90" stroke="#00A67E" stroke-width="2" stroke-linecap="round"/>
  <line x1="58" y1="78" x2="62" y2="90" stroke="#00A67E" stroke-width="2" stroke-linecap="round"/>
  <line x1="48" y1="90" x2="42" y2="90" stroke="#00A67E" stroke-width="2" stroke-linecap="round"/>
  <line x1="48" y1="90" x2="48" y2="96" stroke="#00A67E" stroke-width="2" stroke-linecap="round"/>
  <line x1="62" y1="90" x2="56" y2="90" stroke="#00A67E" stroke-width="2" stroke-linecap="round"/>
  <line x1="62" y1="90" x2="62" y2="96" stroke="#00A67E" stroke-width="2" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text x="118" y="72" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="52" font-weight="700" fill="url(#grad)" letter-spacing="-1">finch</text>

  <!-- Tagline -->
  <text x="120" y="95" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="13" fill="#00A67E" opacity="0.7" letter-spacing="2">portfolio tracker</text>
</svg>
